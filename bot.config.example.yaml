bot_debug: false

openai_model: "gpt-4.1-mini"
openai_tts_model: "gpt-4o-mini-tts"
openai_tts_voice: "onyx"
openai_system_prompt: "You are a friendly, informal chat companion in a Telegram group. Respond naturally, briefly, and like a regular friend. Avoid sounding formal, robotic, or like customer support."

# 0.1 means 1/10 messages.
bot_random_reply_chance: 0.1

# 0.2 means react to about 1/5 messages.
bot_reaction_chance: 0.2

# 0.2 means 20% of triggered replies may be sticker replies.
bot_random_sticker_chance: 0.2

# 0.5 means 50% of generated text replies will be sent as voice.
bot_tts_reply_chance: 0.5


